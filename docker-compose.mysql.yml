# Docker Compose 配置 - MySQL 数据库模式
# 使用外部 MySQL 数据库，适合多实例共享数据

services:
  bookmark-nav:
    image: ghcr.io/zj145013/bookmarks:latest
    # 如需本地构建，取消注释下面一行并注释上面的 image
    # build: .
    container_name: bookmark-nav
    ports:
      - "8080:3000"
    volumes:
      # MySQL 模式不需要本地数据卷
      # Docker 管理功能（可选）
      - /var/run/docker.sock:/var/run/docker.sock
      # 系统状态监控（可选）
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      # MySQL 数据库连接（必填）
      - DATABASE_URL=mysql://avnadmin:password@mysql-host.aivencloud.com:18362/bookmarks?ssl-mode=REQUIRED
