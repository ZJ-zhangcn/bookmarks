# Docker Compose 配置 - MySQL 数据库模式
# 使用外部 MySQL 数据库，适合多实例共享数据

services:
  bookmark-nav:
    image: ghcr.io/zj-zhangcn/bookmarks:latest
    # 如需本地构建，取消注释下面一行并注释上面的 image
    # build: .
    container_name: bookmark-nav
    ports:
      - "8080:3000"
    volumes:
      # MySQL 模式不需要本地数据卷
      # Docker 管理功能（可选）
      - /var/run/docker.sock:/var/run/docker.sock
      # 系统状态监控（可选）
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    # 推荐：将敏感信息写入同目录的 .env（不要提交到 Git）
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      # =====================
      # 鉴权（推荐配置）
      # =====================
      # 管理员令牌（设置后写操作需要 Authorization: Bearer <token>）
      # - ADMIN_TOKEN=your-secret-token
      # 允许匿名写入（个人使用可设为 true，对外服务建议设置 ADMIN_TOKEN）
      - ALLOW_ANONYMOUS_WRITE=true
      # =====================
      # 安全（可选）
      # =====================
      # 允许访问内网地址（WebDAV 同步到 NAS 时需要）
      # - ALLOW_PRIVATE_FETCH=true
      # CORS 允许的源（多个用逗号分隔，不设置则允许所有）
      # - CORS_ORIGIN=https://example.com
      # MySQL 数据库连接（必填，建议写入 .env）
      # - DATABASE_URL=mysql://user:password@host:3306/bookmarks?ssl-mode=REQUIRED
      #
      # =====================
      # AI（可选，默认关闭）
      # =====================
      # - AI_ENABLED=true
      # - AI_PROVIDER=openai            # openai / gemini / claude
      # - AI_MODEL=gpt-4o-mini
      # - AI_BASE_URL=https://api.openai.com/v1
      # - AI_TIMEOUT_MS=8000
      #
      # Key（只配你用的 Provider）
      # - OPENAI_API_KEY=...
      # - GEMINI_API_KEY=...
      # - ANTHROPIC_API_KEY=...
      # - ANTHROPIC_VERSION=2023-06-01
      #
      # 若要在网页里临时切换（自用可选，不建议对外站点开启）
      # - AI_ALLOW_CLIENT_KEY=true
      # - AI_ALLOW_CLIENT_BASE_URL=true
      # - AI_ALLOW_CLIENT_PROVIDER=true
      # - AI_ALLOW_PRIVATE_BASE_URL=true
